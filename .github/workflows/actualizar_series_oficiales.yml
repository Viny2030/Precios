name: Actualizar series oficiales (INDEC + GCBA)

on:
  schedule:
    - cron: "0 9 16 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: series-oficiales
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar series oficiales
        run: python actualizar_series_oficiales.py

      - name: Commitear base de datos actualizada (solo si NO hay Postgres)
        if: ${{ vars.USANDO_POSTGRES != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indice_caba.sqlite
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear (sin dato nuevo publicado, o falla de red)."
          else
            git commit -m "Actualizar series oficiales INDEC/GCBA $(date -u +%Y-%m-%d)"
            git push
          fi
