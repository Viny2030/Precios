name: Actualizar series oficiales (INDEC + GCBA)

# Refresca las series de comparación (INDEC Alimentos GBA, INDEC Nivel
# General Nacional, aperturas por rubro, y GCBA Alimentos CABA) sin tocar
# precios ni sintéticos. Es lo que alimenta las pestañas "Evolución
# general" y "Evolución por rubro" del dashboard (/dashboard).
#
# - Automático: el día 16 de cada mes a las 09:00 UTC (~06:00 ART), con
#   margen sobre la fecha de publicación del INDEC (día 14) y del GCBA.
# - Manual (workflow_dispatch): para forzar un refresco fuera de fecha,
#   ej. si una corrida automática falló por la caída de la fuente.

on:
  schedule:
    - cron: "0 9 16 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: series-oficiales
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar series oficiales
        run: python actualizar_series_oficiales.py

      - name: Commitear base de datos actualizada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indice_caba.sqlite
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear (sin dato nuevo publicado, o falla de red)."
          else
            git commit -m "Actualizar series oficiales INDEC/GCBA $(date -u +%Y-%m-%d)"
            git push
          fi
