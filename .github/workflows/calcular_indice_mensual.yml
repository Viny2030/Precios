name: Calcular indice mensual (mes real cerrado)

on:
  schedule:
    - cron: "0 8 2 * *"
  workflow_dispatch:
    inputs:
      periodo:
        description: >
          Periodo a calcular, formato YYYY-MM (ej. "2026-07"). Dejar vacio
          para calcular el mes calendario anterior al de hoy.
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: calcular-indice-mensual
  cancel-in-progress: false

jobs:
  calcular:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Determinar periodo a calcular
        id: periodo
        run: |
          if [ -n "${{ github.event.inputs.periodo }}" ]; then
            PERIODO="${{ github.event.inputs.periodo }}"
            echo "Periodo forzado manualmente: $PERIODO"
          else
            PERIODO=$(date -u -d "yesterday" +%Y-%m)
            echo "Periodo automatico (mes anterior a hoy): $PERIODO"
          fi
          echo "valor=$PERIODO" >> "$GITHUB_OUTPUT"

      - name: Calcular indice del periodo
        run: python calcular_indice_mensual.py "${{ steps.periodo.outputs.valor }}"

      - name: Commitear indice actualizado (solo si NO hay Postgres)
        if: ${{ vars.USANDO_POSTGRES != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indice_caba.sqlite
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear (sin precios reales todavia para ${{ steps.periodo.outputs.valor }}, o el calculo fallo)."
          else
            git commit -m "Calcular indice ${{ steps.periodo.outputs.valor }} $(date -u +%Y-%m-%d)"
            git push
          fi
