name: Ingesta diaria SEPA

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      dias:
        description: >
          Dias a barrer en esta corrida manual, separados por espacio
          (ej: "Miercoles Jueves Viernes Sabado"). Dejar vacio para que
          corra main.py con el dia de hoy (comportamiento normal diario).
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: ingesta-sepa
  cancel-in-progress: false

jobs:
  ingesta:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr ingesta
        run: |
          if [ -n "${{ github.event.inputs.dias }}" ]; then
            echo "Backfill manual de: ${{ github.event.inputs.dias }}"
            python barrer_semana.py --dias ${{ github.event.inputs.dias }}
          else
            echo "Corrida diaria normal (dia de hoy)"
            python main.py
          fi

      - name: Commitear archivos versionados actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ vars.USANDO_POSTGRES }}" = "true" ]; then
            git add data/diccionario_coicop.csv data/clasificacion_pendiente.csv
          else
            git add data/indice_caba.sqlite data/diccionario_coicop.csv data/clasificacion_pendiente.csv
          fi
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear (0 precios nuevos, o WAF bloqueo la descarga hoy)."
          else
            git commit -m "Ingesta SEPA $(date -u +%Y-%m-%d)"
            git push
          fi
