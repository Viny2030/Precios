name: Recalcular sintetico abril-mayo-junio

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  recalcular:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Re-sembrar sintetico (INDEC real donde ya este publicado)
        run: python sembrar_desarrollo.py

      - name: Recalcular indices abril/mayo/junio
        run: |
          python calcular_indice_mensual.py 2026-04
          python calcular_indice_mensual.py 2026-05
          python calcular_indice_mensual.py 2026-06

      - name: Commitear
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ vars.USANDO_POSTGRES }}" = "true" ]; then
            git add data/diccionario_coicop.csv
          else
            git add data/indice_caba.sqlite data/diccionario_coicop.csv
          fi
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "Recalculo sintetico/indices abr-may-jun $(date -u +%Y-%m-%d)"
            git push
          fi
