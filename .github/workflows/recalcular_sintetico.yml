name: Recalcular sintético abril-mayo-junio

# Manual únicamente. Usar cuando el INDEC publique el dato real de un mes
# que hoy está estimado (ej. junio se publica ~14/07) — re-corre
# sembrar_desarrollo.py (que reemplaza la estimación por el dato real de
# variación INDEC) y recalcula los índices de abril/mayo/junio.
# No toca julio en adelante (eso vive en registro_precios con cadena real,
# fuera del rango de fechas que borra sembrar_desarrollo.py).

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  recalcular:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Re-sembrar sintético (INDEC real donde ya esté publicado)
        run: python sembrar_desarrollo.py

      - name: Recalcular índices abril/mayo/junio
        run: |
          python calcular_indice_mensual.py 2026-04
          python calcular_indice_mensual.py 2026-05
          python calcular_indice_mensual.py 2026-06

      - name: Commitear
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indice_caba.sqlite data/diccionario_coicop.csv
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "Recalculo sintetico/indices abr-may-jun $(date -u +%Y-%m-%d)"
            git push
          fi
